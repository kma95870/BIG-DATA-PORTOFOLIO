version: "3.9"

services:
  # =========================
  # 🗄 PostgreSQL (données ETL)
  # =========================
  postgres:
    image: postgres:16
    container_name: etl_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: etl_db
    ports:
      - "5433:5432"                # ⇐ port hôte 5433 (Windows) -> conteneur 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d etl_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  # =========================
  # 🧰 Adminer (UI SQL web)
  # =========================
  adminer:
    image: adminer:latest
    container_name: etl_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ======================================================
  # ⚙️ Init DB Airflow (métadonnées dans le même Postgres)
  # ======================================================
  init-airflow-db:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      bash -c "
      until pg_isready -h postgres -p 5432 -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'airflow'\" | grep -q 1
      || psql -h postgres -U postgres -c \"CREATE DATABASE airflow;\"
      "
    environment:
      PGPASSWORD: postgres

  # =========================
  # 🧠 Airflow (web + scheduler)
  # =========================
  airflow:
    image: apache/airflow:2.9.2
    container_name: etl_airflow
    restart: unless-stopped
    environment:
      # Core Airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: mysecretkey
      AIRFLOW__CORE__FERNET_KEY: "somethingrandom123456"
      TZ: Europe/Paris

      # Variables dispo pour tes scripts (ingest/transform/load)
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: etl_db
      DB_USER: postgres
      DB_PASS: postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./airflow-logs:/opt/airflow/logs
      - ./airflow-requirements.txt:/requirements.txt
    ports:
      - "8081:8080"               # UI Airflow → http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      init-airflow-db:
        condition: service_completed_successfully
    command: >
      bash -c "
      pip install --no-cache-dir -r /requirements.txt &&
      airflow db upgrade &&
      airflow users create --username admin --password admin --firstname Moha --lastname Krim --role Admin --email admin@example.com || true &&
      airflow webserver & airflow scheduler
      "

  # =========================
  # 📊 Streamlit (dashboard)
  # =========================
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etl_streamlit
    ports:
      - "8501:8501"               # UI Streamlit → http://localhost:8501
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres           # ⚠️ dans Docker, on parle au service 'postgres'
      DB_PORT: "5432"
      DB_NAME: etl_db
      DB_USER: postgres
      DB_PASS: postgres
      TZ: Europe/Paris
    volumes:
      - ./data:/app/data          # utile si ton app lit des Parquet locaux

volumes:
  pgdata:
